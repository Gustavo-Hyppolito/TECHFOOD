<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/cadrastro.css">

    <title>Cadastrar Prato</title>
</head>
<body>

<header id="topo-loja">
    <h1>TechFood - Sabor & Saber</h1>

    <nav id="menu">
        <ul>
            <li><a href="index.html">Cardápio</a></li>
            <li><a href="pedidos.html">Meus Pedidos</a></li>
            <li><a href="cadrastros.html">Cadastrar Prato</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="form-container">

        <h2>Cadastrar Novo Prato</h2>

        <form id="form-produto">

            <input
                type="text"
                id="nome"
                placeholder="Nome do prato"
                required
            >

            <textarea
                id="descricao"
                placeholder="Descrição"
                required
            ></textarea>

            <input
                type="number"
                id="preco"
                placeholder="Preço"
                step="0.01"
                required
            >

            <input
                type="text"
                id="categoria"
                placeholder="Categoria"
                required
            >

            <input
                type="text"
                id="imagem"
                placeholder="URL da imagem"
            >

            <button type="submit">
                Cadastrar Produto
            </button>

        </form>

        <p id="mensagem"></p>

    </section>

</main>

<script src="src/scripts/api.js"></script>
<script src="src/scripts/cadrastro.js"></script>

</body>
</html>
