<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />
    <title>TechFood - Cadastro de Pratos</title>
  </head>
  <body>
    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p id="boas-vindas">Carregando...</p>

      <input type="checkbox" id="bt_menu" />
      <label for="bt_menu" id="label-menu" aria-label="Abrir menu"
        >&#9776;</label
      >

      <nav id="menu">
        <ul>
          <li><a href="index.html">Cardápio</a></li>
          <li><a href="pedidos.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="secao-cadastro">
        <h2>📝 Cadastro de Prato</h2>
        <form id="formulario-prato">
          <label for="nome-prato">Nome do Prato *</label>
          <input
            type="text"
            id="nome-prato"
            name="nome-prato"
            placeholder="Ex: Lasanha à Bolonhesa"
            required
          />

          <label for="descricao-prato">Descrição *</label>
          <input
            type="text"
            id="descricao-prato"
            name="descricao-prato"
            placeholder="Ex: Massa fresca com molho caseiro e queijo derretido"
            required
          />

          <label for="preco-prato">Preço (R$) *</label>
          <input
            type="text"
            id="preco-prato"
            name="preco-prato"
            placeholder="Ex: 45,90"
            required
          />

          <label for="imagem">Foto do Prato (JPG, PNG)</label>
          <input
            type="file"
            id="imagem"
            name="imagem"
            accept="image/jpeg,image/png,image/gif,image/webp"
          />

          <button type="submit" id="btn-criar-produto">Criar Produto</button>
        </form>
      </section>
    </main>

    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
        <p>Av. das Nações, 1500</p>
      </div>
      <p id="data-hora-footer"></p>
    </footer>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/cadastro.js"></script>
  </body>
</html>
