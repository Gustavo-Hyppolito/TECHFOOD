<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />
    <title>TechFood - Cadastrar Prato</title>
  </head>
  <body>

    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p id="boas-vindas">Carregando...</p>

      <input type="checkbox" id="bt_menu" />
      <label for="bt_menu" id="label-menu" aria-label="Abrir menu">&#9776;</label>

      <nav id="menu" role="navigation" aria-label="Menu principal">
        <ul>
          <li><a href="index.html">Card&#225;pio</a></li>
          <li><a href="pedidos.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html" class="ativo">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="secao-cadastro">
        <h2 class="titulo-secao">&#127859; Cadastrar Novo Prato</h2>
        <form id="form-cadastro" novalidate>

          <div class="campo-grupo">
            <label for="input-nome">Nome do Prato *</label>
            <input
              type="text"
              id="input-nome"
              placeholder="Ex: Lasanha Bolonhesa"
              maxlength="80"
              autocomplete="off"
            />
            <span class="campo-erro" id="erro-nome"></span>
          </div>

          <div class="campo-grupo">
            <label for="input-descricao">Descri&#231;&#227;o *</label>
            <textarea
              id="input-descricao"
              placeholder="Ex: Massa artesanal com molho bolonhesa e bechamel gratinado."
              maxlength="200"
              rows="3"
            ></textarea>
            <span class="campo-contador" id="contador-descricao">0 / 200</span>
            <span class="campo-erro" id="erro-descricao"></span>
          </div>

          <div class="campos-lado-a-lado">
            <div class="campo-grupo">
              <label for="input-preco">Pre&#231;o (R$) *</label>
              <input
                type="number"
                id="input-preco"
                placeholder="0,00"
                min="0.01"
                step="0.01"
              />
              <span class="campo-erro" id="erro-preco"></span>
            </div>

            <div class="campo-grupo">
              <label for="select-categoria">Categoria *</label>
              <select id="select-categoria">
                <option value="">Selecione...</option>
                <option value="Massas">Massas</option>
                <option value="Carnes">Carnes</option>
                <option value="Entradas">Entradas</option>
                <option value="Sobremesas">Sobremesas</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Vegano">Vegano</option>
              </select>
              <span class="campo-erro" id="erro-categoria"></span>
            </div>
          </div>
          <div class="campo-grupo">
            <label for="input-imagem">URL da Imagem (opcional)</label>
            <input
              type="url"
              id="input-imagem"
              placeholder="https://exemplo.com/imagem.jpg"
            />
            <span class="campo-erro" id="erro-imagem"></span>
            <div id="preview-imagem-container" style="display: none;">
              <img id="preview-imagem" src="" alt="Pr&#233;via da imagem" />
            </div>
          </div>

          <div id="feedback-cadastro" style="display: none;" role="alert"></div>

          <div class="btn-cadastro-grupo">
            <button type="button" id="btn-limpar-form" class="btn-secundario">
              &#128465; Limpar
            </button>
            <button type="submit" id="btn-salvar-prato" class="btn-primario">
              &#10003; Salvar Prato
            </button>
          </div>

        </form>
        <div id="secao-recentes" style="display: none;">
          <h3 class="titulo-secao" style="margin-top: 40px;">
            &#128203; Cadastrados Nesta Sess&#227;o
          </h3>
          <ul id="lista-recentes"></ul>
        </div>

      </section>
    </main>

    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI It&#225;lo Bologna - Itu/SP</p>
        <p>Av. das Na&#231;&#245;es, 1500</p>
      </div>
      <p id="data-hora-footer"></p>
    </footer>
    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/cadastro.js"></script>
  </body>
</html>
